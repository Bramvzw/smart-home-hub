services:
  hub:
    image: webdevops/php-nginx:8.3-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file: .env
    volumes:
      - .:/app
      # Production opcache/realpath tuning. Verify the conf.d path on the NAS with:
      #   docker compose exec hub php -i | grep -E "validate_timestamps|Additional .ini"
      - ./docker/php/zz-hub.ini:/usr/local/etc/php/conf.d/zz-hub.ini:ro
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      APP_ENV: production
      PHP_MEMORY_LIMIT: 128M
      PHP_MAX_EXECUTION_TIME: 30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
