<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Tasks Drag and Drop Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a202c;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
        }
        .test-section {
            background-color: #2d3748;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 {
            color: #a0aec0;
            margin-top: 0;
        }
        button {
            background-color: #4c51bf;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #5a67d8;
        }
        .result {
            background-color: #1a202c;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            color: #68d391;
        }
        .error {
            color: #fc8181;
        }
        .board {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .lane {
            background-color: #4a5568;
            border-radius: 8px;
            width: 250px;
            min-width: 250px;
            padding: 10px;
        }
        .lane-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d3748;
        }
        .lane-title {
            font-weight: bold;
            color: #e2e8f0;
            margin: 0;
        }
        .tasks-container {
            min-height: 200px;
        }
        .task {
            background-color: #2d3748;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: move;
            border: 1px solid #4a5568;
            transition: all 0.2s;
        }
        .task:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .task-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .task-description {
            font-size: 0.875rem;
            color: #a0aec0;
        }
        .ghost {
            opacity: 0.5;
            background-color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tasks Drag and Drop Test</h1>

        <div class="test-section">
            <h2>Test: Drag and Drop Tasks</h2>
            <p>This test checks if tasks can be dragged and dropped between lanes.</p>
            <button id="initialize-board">Initialize Board</button>
            <button id="reset-board">Reset Board</button>
            <div id="drag-drop-result" class="result"></div>

            <div id="board" class="board">
                <!-- Lanes will be created dynamically -->
            </div>
        </div>
    </div>

    <!-- Include SortableJS from CDN for testing -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const initializeBoardBtn = document.getElementById('initialize-board');
            const resetBoardBtn = document.getElementById('reset-board');
            const dragDropResult = document.getElementById('drag-drop-result');
            const board = document.getElementById('board');

            // Sample data for lanes and tasks
            const lanes = [
                {
                    id: 1,
                    name: 'To Do',
                    tasks: [
                        { id: 1, title: 'Task 1', description: 'Description for Task 1' },
                        { id: 2, title: 'Task 2', description: 'Description for Task 2' },
                        { id: 3, title: 'Task 3', description: 'Description for Task 3' }
                    ]
                },
                {
                    id: 2,
                    name: 'In Progress',
                    tasks: [
                        { id: 4, title: 'Task 4', description: 'Description for Task 4' },
                        { id: 5, title: 'Task 5', description: 'Description for Task 5' }
                    ]
                },
                {
                    id: 3,
                    name: 'Done',
                    tasks: [
                        { id: 6, title: 'Task 6', description: 'Description for Task 6' }
                    ]
                }
            ];

            // Function to create a task element
            function createTaskElement(task) {
                const taskElement = document.createElement('div');
                taskElement.className = 'task';
                taskElement.dataset.taskId = task.id;

                const titleElement = document.createElement('div');
                titleElement.className = 'task-title';
                titleElement.textContent = task.title;

                const descriptionElement = document.createElement('div');
                descriptionElement.className = 'task-description';
                descriptionElement.textContent = task.description;

                taskElement.appendChild(titleElement);
                taskElement.appendChild(descriptionElement);

                return taskElement;
            }

            // Function to create a lane element
            function createLaneElement(lane) {
                const laneElement = document.createElement('div');
                laneElement.className = 'lane';
                laneElement.dataset.laneId = lane.id;

                const headerElement = document.createElement('div');
                headerElement.className = 'lane-header';

                const titleElement = document.createElement('h3');
                titleElement.className = 'lane-title';
                titleElement.textContent = lane.name;

                headerElement.appendChild(titleElement);
                laneElement.appendChild(headerElement);

                const tasksContainer = document.createElement('div');
                tasksContainer.className = 'tasks-container';
                tasksContainer.dataset.laneId = lane.id;

                lane.tasks.forEach(task => {
                    tasksContainer.appendChild(createTaskElement(task));
                });

                laneElement.appendChild(tasksContainer);

                return laneElement;
            }

            // Function to initialize the board
            function initializeBoard() {
                // Clear the board
                board.innerHTML = '';

                // Create lanes
                lanes.forEach(lane => {
                    board.appendChild(createLaneElement(lane));
                });

                // Initialize Sortable for each tasks container
                document.querySelectorAll('.tasks-container').forEach(container => {
                    new Sortable(container, {
                        group: 'tasks',
                        animation: 150,
                        ghostClass: 'ghost',
                        onEnd: function(evt) {
                            const taskId = evt.item.dataset.taskId;
                            const laneId = evt.to.dataset.laneId;
                            const newIndex = Array.from(evt.to.children).indexOf(evt.item);

                            dragDropResult.innerHTML += `\nTask ${taskId} moved to lane ${laneId} at position ${newIndex}`;
                            dragDropResult.classList.add('success');
                        }
                    });
                });

                dragDropResult.innerHTML = 'Board initialized successfully. Try dragging tasks between lanes.';
                dragDropResult.className = 'result success';
            }

            // Initialize board button click handler
            initializeBoardBtn.addEventListener('click', function() {
                try {
                    initializeBoard();
                } catch (error) {
                    dragDropResult.innerHTML = `Error initializing board: ${error.message}`;
                    dragDropResult.className = 'result error';
                }
            });

            // Reset board button click handler
            resetBoardBtn.addEventListener('click', function() {
                try {
                    // Reset to original state
                    initializeBoard();
                    dragDropResult.innerHTML = 'Board reset to original state.';
                    dragDropResult.className = 'result success';
                } catch (error) {
                    dragDropResult.innerHTML = `Error resetting board: ${error.message}`;
                    dragDropResult.className = 'result error';
                }
            });
        });
    </script>
</body>
</html>
