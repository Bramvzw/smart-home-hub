# Guard Dog — scope contract for the Calendar module v1 (smart-home-hub).
#
# First real supervised feature: Guard Dog P1-001 prototype. Scope fixed via
# grill on 2026-06-10 (source conflict caught and resolved: Google Calendar
# via secret ICS URL now, full Google API parked as upgrade path).
#
# Schema: guard-dog docs/contract.schema.json (v0.2).

schema_version: "0.2"

task:
  id: CALENDAR-V1
  title: "Calendar module: read-only Google-agenda via secret ICS feed"
  summary: >
    New nwidart module Modules/Calendar following the existing module pattern
    (Spotify as reference). Reads one or more Google Calendar secret ICS
    feeds from config (labelled, with a colour per calendar), parses them
    with sabre/vobject, caches results (15 min TTL), and shows upcoming
    events on a module page with a list/week view (no dashboard widget —
    owner decision, see amendments). Read-only: no event creation, no OAuth,
    no database.

risk_profile:
  level: Medium
  categories: [scope-creep, duplicate-ui, missing-tests, dependency-creep]
  reasons:
    - "External HTTP fetch with a secret URL — secret handling in config, never in views or logs."
    - "One new production dependency (sabre/vobject) enters via the approval gate."
    - "First module built by a supervised agent; pattern-following must be enforced, not hoped."

confirmed_requirements:
  - "Module implements App\\Contracts\\ModuleContract like existing modules (name, slug, navigation; getDashboardWidget() returns null — no widget)."
  - "ICS feeds come from config/env: CALENDAR_ICS_FEEDS (one 'label | colour | url' per line), with CALENDAR_ICS_URLS as single unlabelled fallback; secret URLs never appear in Blade, logs, or exceptions."
  - "Events are fetched and parsed with sabre/vobject, including recurring events expanded for the visible window."
  - "Laravel cache with 15-minute TTL; a failed fetch falls back to the last cached result with a stale indicator."
  - "Multiple ICS feeds are supported (single-feed remains valid)."
  - "Per-feed degradation: one feed failing (timeout, HTTP error, parse error) must not blank the others — only the failed feed is marked stale, the rest render normally."
  - "Each event carries its source calendar's label and colour so feeds are visually distinguishable in list and week views."
  - "Module page: list/week view. (Dashboard widget dropped — owner decision 2026-06-10, see amendments.)"
  - "Empty, error (feed unreachable), and loading states are designed and visible."
  - "Timezone handling: events render in the hub's app timezone."

out_of_scope:
  - "Google Calendar API / OAuth (documented upgrade path — own contract later)"
  - "Creating, editing, or deleting events"
  - "Local event storage, migrations, or sync jobs"
  - "Automations triggered by events"
  - "Obsidian / graphify modules (parked as separate module candidates)"
  - "Refactoring dashboard.blade.php slug-based descriptions (parked: getModuleDescription() on ModuleContract)"
  - "Dashboard widget (owner decision 2026-06-10: calendar page only; dead widget path removed in repair)"

allowed:
  frontend: true        # module views + one dashboard icon
  backend: true         # module providers, services, routes
  database: false
  auth: false
  billing: false
  payments: false
  queues: false
  migrations: false
  permissions: false
  dependencies: true    # exactly one, via the gate below

blocked_paths:
  - ".env"
  - ".env.*"
  - "database/**"
  - "app/Models/**"
  - "app/Http/**"
  - "app/Contracts/**"        # ModuleContract stays untouched (see out_of_scope)
  - "Modules/Spotify/**"
  - "Modules/Tasks/**"
  - "Modules/Vikunja/**"
  - "resources/views/dashboard.blade.php"
  - "config/auth.php"
  - "config/database.php"
  - ".guarddog/**"
  - ".claude/**"

do_not:
  - "Do not add any package other than sabre/vobject."
  - "Do not log, render, or expose the secret ICS URL anywhere."
  - "Do not touch other modules or shared app code; the only file outside Modules/Calendar may be the dashboard icon and module registration."
  - "Do not hand-roll ICS/RRULE parsing next to sabre/vobject."
  - "Do not create UI that duplicates existing hub-card/layout patterns — reuse the dashboard styles."
  - "Do not weaken, skip, or delete existing tests."

approval_gates:
  dependency_changes:
    allowed: true
    approved_packages: ["sabre/vobject"]
  new_blade_components:
    allowed: true
    approved_components: ["dashboard.icons.calendar"]
  sensitive_surfaces:
    allowed: []

build_budget:
  max_files_touched: 28
  max_new_files: 22
  max_new_dependencies: 1
  max_new_components: 1
  notes: >
    Covers scaffold + repair + multi-feed amendment: named-feed config,
    per-feed fetch/degradation in CalendarService, a feed source value
    object, label/colour on the event DTO, view/viewmodel updates, tests,
    icon, and module registration (composer.json/lock, modules_statuses.json).

ui:
  applicable: true
  use_existing_blade_components: true
  new_components_require_approval: true
  approved_new_components: ["dashboard.icons.calendar"]
  verification:
    changed_screens: [calendar-module-page]
    required_states: [with-events, empty, feed-error-stale]
    mobile_viewport_required: false
    screenshot_comparison: optional
    accessibility_check: optional

tests:
  required:
    - ics_parsing_unit_test        # fixture .ics incl. recurring + timezone case
    - calendar_service_cache_test  # TTL + stale fallback behavior
    - module_page_feature_test     # route renders, events listed, empty state
    - multi_feed_merge_test        # two feeds merged + sorted chronologically
    - per_feed_degradation_test    # feed A fails, feed B still renders, A flagged stale
  local_quality_gates:
    pint: required
    laravel_tests: required
    blade_view_cache: required
    composer_dependency_diff: required

required_evidence:
  tests: [ics_parsing_unit_test, calendar_service_cache_test, module_page_feature_test, multi_feed_merge_test, per_feed_degradation_test]
  local_checks: ["composer test green", "pint clean", "view:cache compiles"]
  ui_evidence: ["screenshots: module page with events, empty state, feed-error/stale state"]
  docs: []

verification_debt:
  assumptions_to_validate:
    - "Google's secret ICS feed lags (minutes to hours); accepted for v1, revisit with the API upgrade."
  hidden_architecture_decisions: []
  extra_review_needed:
    - "Recurring-event expansion correctness around DST boundaries."
  missing_or_deferred_checks:
    - "No PHPStan in this project; static analysis not part of the gates."
  maintainer_risks: []

future_considerations:
  - "Google Calendar API upgrade: OAuth, fresh data, calendar picker, write access — own High-risk contract."
  - "getModuleDescription() on ModuleContract so dashboard descriptions stop being slug-hardcoded."
  - "Obsidian module (vault/Local REST API) and 'graphify' candidate — scope when requested."
  - "Event-driven automations once an automation engine exists."
  - "Per-calendar visibility toggles (show/hide a feed) — own follow-up if needed."

amendments:
  - date: 2026-06-10
    reason: >
      Owner functional decisions after deep review: calendar page only (dashboard
      widget requirement dropped; dead widget path removed in repair) and
      single-feed confirmed as the v1 design. Repair scope: remove dead widget
      path, strengthen tests (raw timezone assertion, all-day + DST fixtures,
      stale-fallback test).
    fields_changed: [confirmed_requirements, out_of_scope, future_considerations, ui, amendments, status]
    re_approved_by: owner
    re_approved_date: 2026-06-10
  - date: 2026-06-10
    reason: >
      Owner reverses the single-feed v1 decision ("ik wil toch een tweede
      kalender kunnen toevoegen"): multiple calendars are in scope. Guardrail
      from the earlier note honoured: per-feed degradation required before
      multi-feed ships, plus per-calendar label/colour for visual distinction.
      Config shape decided by Guard Dog (technical): CALENDAR_ICS_FEEDS with
      'label | colour | url' lines, CALENDAR_ICS_URLS as single-feed fallback.
      No new dependency, no database, no OAuth. The build agent correctly
      refused out-of-contract work and escalated; this amendment is the
      owner's answer, applied by the owner.
    fields_changed: [task, confirmed_requirements, future_considerations, build_budget, tests, required_evidence, amendments, status]
    re_approved_by: owner
    re_approved_date: 2026-06-10

status:
  contract_approved: true
  approved_by: owner
  approved_date: 2026-06-10
  approval_hash: "sha256:ac701ab43ff5770f33e72075490a2f3ecf201ab03628d7cbc1695a927841d588"
