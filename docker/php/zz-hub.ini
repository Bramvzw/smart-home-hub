; Production PHP tuning for the smart-home-hub container.
; Mounted into the PHP conf.d so it overrides image defaults (zz- = loaded last).
;
; The app is bind-mounted from the NAS filesystem (volumes: .:/app). With
; validate_timestamps=1 PHP stat()s every included file on (nearly) every
; request, which is slow over the NAS mount on a weak CPU. Freezing opcache
; removes that cost.
;
; TRADE-OFF: with validate_timestamps=0, PHP only sees new code after an
; opcache reset. Deploy workflow becomes: git pull -> make deploy (restarts).

opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=0
opcache.memory_consumption=192
opcache.max_accelerated_files=20000
opcache.interned_strings_buffer=16

; Cache resolved real paths so the bind-mount filesystem is hit far less often.
realpath_cache_size=4096K
realpath_cache_ttl=600
